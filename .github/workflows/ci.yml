# erpnext-ai-forge — CI pipeline
# Triggers: push to main, all PRs.
#
# Jobs run in parallel where independent. Security scans (gitleaks) gate the
# pipeline so a leaked secret blocks the entire run, not just a single test.
#
# Python tooling: uv (https://docs.astral.sh/uv/). `uv sync --frozen`
# installs the exact versions pinned in forge/uv.lock for reproducibility.

name: forge-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # 1. Secrets scan — runs first; pipeline aborts if anything matches
  # ---------------------------------------------------------------------------
  gitleaks:
    name: gitleaks (secrets scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history for diff scanning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 2. Lint — Markdown + YAML formatting and structure
  # ---------------------------------------------------------------------------
  lint:
    name: markdownlint + yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install lint tools
        run: |
          npm install -g markdownlint-cli@0.43.0
          uv tool install yamllint==1.35.1

      - name: markdownlint
        run: markdownlint --config .markdownlint.yaml '**/*.md' --ignore node_modules --ignore '**/.venv/**' --ignore canonical/_deprecated

      - name: yamllint
        run: yamllint -c .yamllint.yaml .

  # ---------------------------------------------------------------------------
  # 3. forge validate + score + tests
  # ---------------------------------------------------------------------------
  forge:
    name: forge validate + score + test
    runs-on: ubuntu-latest
    needs: [gitleaks]      # don't waste a runner if secrets leaked
    defaults:
      run:
        working-directory: forge      # uv operates on forge/pyproject.toml
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true            # caches ~/.cache/uv between runs

      - name: Set up Python (pinned via .python-version)
        run: uv python install

      - name: Install dependencies from uv.lock (frozen, reproducible)
        run: uv sync --frozen --all-extras

      - name: forge validate (schema + caller refs)
        run: uv run forge validate
        working-directory: ${{ github.workspace }}    # forge needs repo root

      - name: forge score (canonical/)
        run: uv run --project forge forge score --path canonical/ --fail-below 80
        working-directory: ${{ github.workspace }}

      - name: forge test (pytest)
        run: uv run pytest tests/ -v

      - name: forge sync --all --dry-run (renders every adapter)
        env:
          FORGE_BENCH_PATH: ${{ github.workspace }}/.ci-fake-bench
          FORGE_PRIMARY_SITE: ci-site
        run: |
          mkdir -p "$FORGE_BENCH_PATH/apps"
          uv run --project forge forge sync --all --dry-run
        working-directory: ${{ github.workspace }}

      - name: Upload audit log on failure (forensics)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: forge-audit-${{ github.run_id }}
          path: audit/
          retention-days: 14
